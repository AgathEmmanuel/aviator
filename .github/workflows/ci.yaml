name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run unit tests
        run: |
          go test ./internal/latency/ -v -race -coverprofile=cover-latency.out
          go test ./internal/circuitbreaker/ -v -race -coverprofile=cover-cb.out
          go test ./internal/ebpf/ -v -race -coverprofile=cover-ebpf.out
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover-*.out

  build-controller:
    name: Build Controller
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build controller binary
        run: CGO_ENABLED=0 go build -o bin/manager cmd/main.go
      - name: Build controller image
        run: docker build -t aviator-controller:ci .

  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build agent binary
        run: CGO_ENABLED=0 go build -o bin/agent cmd/agent/main.go
      - name: Build agent image
        run: docker build -f Dockerfile.agent -t aviator-agent:ci .
