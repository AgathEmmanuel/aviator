apiVersion: aviator.example.com/v1alpha1
kind: AviatorPolicy
metadata:
  labels:
    app.kubernetes.io/name: aviator
    app.kubernetes.io/managed-by: kustomize
  name: aviatorpolicy-sample
spec:
  targetRef:
    apiVersion: v1
    kind: Service
    name: test-app
  latencyThreshold: 100ms
  evaluationInterval: 5s
  latencySource: ebpf
  selection:
    mode: percentage
    percentage: 50
  circuitBreaker:
    enabled: true
    p99Threshold: 500ms
    consecutiveViolations: 3
    recoveryInterval: 30s
  dampening:
    enabled: true
    thresholdPercent: 20
    consecutiveIntervals: 3
