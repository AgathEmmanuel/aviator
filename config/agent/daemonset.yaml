apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aviator-ebpf-agent
  namespace: aviator-system
  labels:
    app.kubernetes.io/name: aviator-ebpf-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: aviator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aviator-ebpf-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aviator-ebpf-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: aviator
    spec:
      serviceAccountName: aviator-ebpf-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: aviator-agent:latest
          args:
            - --listen-address=:9100
            - --bpf-object=/opt/aviator/tcp_latency.o
          ports:
            - containerPort: 9100
              name: http-api
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
              drop:
                - ALL
          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
      tolerations:
        - operator: Exists
